<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Skyclaw AI — Unified Multi-Model AI Platform powered by Claude, GPT, Gemini, Llama, and more.">
  <title>Skyclaw AI</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Markdown Rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Code Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- KaTeX for Math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  SIDEBAR                                                -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="14" stroke="url(#logoGrad)" stroke-width="2.5"/>
            <path d="M16 6 L22 20 L10 20 Z" fill="url(#logoGrad)" opacity="0.9"/>
            <path d="M16 10 L20 20 L12 20 Z" fill="#0a0e1a"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Skyclaw</span>
      </div>
      <button class="btn-icon" id="newChatBtn" title="New Chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-search">
      <input type="text" id="searchConversations" placeholder="Search conversations..." autocomplete="off">
    </div>

    <div class="conversation-list" id="conversationList">
      <!-- Dynamically populated -->
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-item" id="settingsBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        <span>Settings</span>
      </div>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  MAIN CONTENT                                           -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <main class="main-content" id="mainContent">

    <!-- Top Bar -->
    <header class="top-bar">
      <button class="btn-icon sidebar-toggle" id="sidebarToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="model-selector-wrapper">
        <select id="modelSelector" class="model-selector">
          <!-- Populated dynamically -->
        </select>
        <div class="model-badge" id="providerBadge">Loading...</div>
      </div>

      <button class="btn-icon" id="exportBtn" title="Export Conversation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </header>

    <!-- Chat Messages -->
    <div class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome screen shown when no messages -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-logo">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="32" cy="32" r="28" stroke="url(#wGrad)" stroke-width="3"/>
              <path d="M32 12 L44 40 L20 40 Z" fill="url(#wGrad)" opacity="0.85"/>
              <path d="M32 18 L40 40 L24 40 Z" fill="#0a0e1a"/>
              <defs>
                <linearGradient id="wGrad" x1="0" y1="0" x2="64" y2="64">
                  <stop offset="0%" stop-color="#6366f1"/>
                  <stop offset="50%" stop-color="#8b5cf6"/>
                  <stop offset="100%" stop-color="#a78bfa"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="welcome-title">Skyclaw AI</h1>
          <p class="welcome-subtitle">Unified access to the world's most powerful AI models</p>
          <div class="welcome-chips">
            <button class="welcome-chip" data-prompt="Explain quantum computing in simple terms">
              <span class="chip-icon">⚛️</span> Explain quantum computing
            </button>
            <button class="welcome-chip" data-prompt="Write a Python script that analyzes CSV data and generates a summary report">
              <span class="chip-icon">🐍</span> Write a Python data analyzer
            </button>
            <button class="welcome-chip" data-prompt="Compare the pros and cons of React, Vue, and Svelte for a new web project">
              <span class="chip-icon">⚡</span> Compare JS frameworks
            </button>
            <button class="welcome-chip" data-prompt="Help me debug this error and explain what went wrong step by step">
              <span class="chip-icon">🔧</span> Debug my code
            </button>
          </div>
          <div class="welcome-providers">
            <span class="provider-pill openrouter">OpenRouter</span>
            <span class="provider-pill gemini">Gemini</span>
            <span class="provider-pill groq">Groq</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container">
        <div class="input-wrapper">
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="Message Skyclaw AI..."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled title="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
          <button class="stop-btn hidden" id="stopBtn" title="Stop generating">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint">Enter to send · Shift+Enter for new line</span>
          <span class="char-count" id="charCount">0</span>
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  SETTINGS MODAL                                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="btn-icon" id="closeSettings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label class="setting-label">System Prompt</label>
          <textarea id="systemPromptInput" class="setting-textarea" rows="4" placeholder="You are a helpful AI assistant..."></textarea>
          <span class="setting-hint">This instruction is sent with every message to guide the AI's behavior.</span>
        </div>
        <div class="setting-group">
          <label class="setting-label">Temperature</label>
          <div class="setting-range-row">
            <input type="range" id="temperatureSlider" min="0" max="2" step="0.1" value="0.7" class="setting-range">
            <span id="temperatureValue" class="setting-range-value">0.7</span>
          </div>
          <span class="setting-hint">Higher = more creative, Lower = more focused.</span>
        </div>
        <div class="setting-group">
          <label class="setting-label">Actions</label>
          <button class="btn-danger" id="clearAllBtn">Clear All Conversations</button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Script -->
  <script src="/js/app.js"></script>
</body>
</html>
